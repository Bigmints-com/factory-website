# App Spec Template — Based on the Booking app (apps/booking)
# Copy this file and modify for new apps.

apiVersion: saveaday/v1
kind: AppSpec
status: draft # Change to 'ready' when this spec should be picked up

metadata:
  name: Booking
  slug: booking
  package: booking_app
  description: "Scheduling and appointment management platform"
  icon: "📅"
  color: indigo
  brandAccent: "#6366F1"
  group: superapp

deployment:
  port: 3017
  region: us-central1
  customDomain: bookings.saveaday.ai

database:
  firestoreId: booking
  collections:
    - bookings
    - assets
    - professionals
    - availabilityBlocks
    - webhooks
    - embedTokens
    - connections
    - webhookDeliveries
    - emailLinkTokens

api:
  resources:
    - name: booking
      collection: bookings
      searchFields: [title, customerName, customerEmail]
      fields:
        title:
          type: string
          required: false
          default: "New Booking"
          description: "Booking title"
        customerName:
          type: string
          required: true
          description: "Customer full name"
        customerEmail:
          type: string
          required: true
          description: "Customer email address"
        customerPhone:
          type: string
          required: false
          description: "Customer phone number"
        start:
          type: string
          required: true
          description: "ISO 8601 start datetime"
        end:
          type: string
          required: true
          description: "ISO 8601 end datetime"
        status:
          type: string
          required: false
          default: "confirmed"
          description: "Booking status (confirmed, pending, cancelled)"
        assetId:
          type: string
          required: false
          description: "Associated asset ID"
        professionalId:
          type: string
          required: false
          description: "Associated professional ID"
        notes:
          type: string
          required: false
          description: "Additional notes"
        source:
          type: string
          required: false
          default: "dashboard"
          description: "Booking source (dashboard, embed, api)"
  # Only list endpoints the factory needs to CREATE.
  # Shared infra (auth, llm-config, connections, me) is provided by ecosystem packages.
  endpoints:
    - api/v1/bookings
    - api/public/resources/:token
    - api/public/resources/:token/book

features:
  publicPage: true
  connections: true
  embed: true

pages:
  Dashboard:
    topCards:
      - "Total Bookings"
      - "Confirmed"
      - "Pending"
      - "Cancelled"
    mainView:
      - type: "weekly-calendar"
        resources: ["assets", "professionals", "bookings", "blocks"]
  Assets:
    list: true
    create: true
    detail: true
    collection: "assets"
  Professionals:
    list: true
    create: true
    detail: true
    collection: "professionals"
  Schedule:
    type: "calendar"
    collection: "bookings"
  Connections:
    type: "list"
    collection: "connections"
  Integrations:
    subPages:
      - "API"
      - "Embed"
  Settings:
    type: "form"

publicPage:
  hero:
    title: "Easy Online Booking"
    subtitle: "Schedule appointments and manage bookings effortlessly"
  features:
    - icon: Calendar
      title: "Smart Scheduling"
      description: "Book available slots with conflict detection"
    - icon: Users
      title: "Resource Management"
      description: "Manage assets and professionals in one place"
    - icon: Link
      title: "Embeddable Widget"
      description: "Add a booking widget to any website"
  faqs:
    - q: "How do I create a booking?"
      a: "Go to Dashboard, select a time slot, and fill in customer details."
    - q: "Can I embed a booking widget on my website?"
      a: "Yes, go to Integrations > Embed to generate an embeddable booking link."
    - q: "How do professionals set their availability?"
      a: "Each professional has configurable working hours, slot durations, and buffer times."
    - q: "Can bookings be made via API?"
      a: "Yes, use the /api/v1/bookings endpoint with an API token."

acceptance:
  - "App builds: pnpm build --filter booking_app"
  - "Lint passes: pnpm lint --filter booking_app"
  - "Registered in apps.json"
  - "Registered in app-switcher.tsx"
  - "API endpoints return 200: GET/POST /api/v1/bookings"
  - "Embed endpoint renders: /embed/:token"
  - "Public homepage renders"
  - "Dashboard renders after auth with stats + calendar"
